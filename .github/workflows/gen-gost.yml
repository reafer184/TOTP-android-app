name: Generate gost.js

on:
  workflow_dispatch:

jobs:
  gen-gost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/gost-streebog-totp
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install gostcrypto -q

      - name: Generate pwa/gost.js
        run: |
          python3 - <<'PYEOF'
import base64, urllib.request
from gostcrypto.gosthash.gost_34_11_2012 import _T, GOST34112012

flat = bytearray()
for k in range(8):
    for x in range(256):
        flat += _T[k][x].to_bytes(8, 'little')
B64 = base64.b64encode(flat).decode()

def lps(d):
    out = bytearray(64)
    for col in range(8):
        base = col*8
        for k in range(8):
            t = (k*256+d[col+k*8])*8
            v = int.from_bytes(flat[t:t+8],'little')
            cur = int.from_bytes(out[base:base+8],'little')
            out[base:base+8] = (cur^v).to_bytes(8,'little')
    return bytes(out)
assert lps(bytes(range(64))) == bytes(GOST34112012._hash_lps(bytearray(range(64)))), "FAIL"

with urllib.request.urlopen(
    "https://raw.githubusercontent.com/reafer184/TOTP-android-app"
    "/27a25f8b6abbe5016fb9a80c2ada8373c25b233c/pwa/gost.js"
) as r:
    orig = r.read().decode()
lines = orig.split("\n")
gh_start = next(i for i,l in enumerate(lines) if "GOST R 34.12" in l and chr(0x2500) in l)
gh_section = "\n".join(lines[gh_start:])

